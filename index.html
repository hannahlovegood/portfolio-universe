<style>
  :root{
    --bg:#0d0e20; --ink:#f4f1ea; --muted:#a9a6c0;

    --focus:#8ab4ff;
    --shadow:0 20px 60px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    overflow:hidden;-webkit-tap-highlight-color:transparent;}
  #scene{position:fixed;inset:0;display:block;touch-action:none;cursor:grab;}
  #scene.grabbing{cursor:grabbing;}
  #scene.pointer{cursor:pointer;}

  /* 顶部铭牌 */
  .topbar{position:fixed;top:16px;left:16px;z-index:20;pointer-events:none;}
  .topbar h1{margin:0;font-size:16px;letter-spacing:.5px;font-weight:650;}
  .topbar p{margin:2px 0 0;font-size:12px;color:var(--muted);}

  /* 浮动项目名标签 */
  #labels{position:fixed;inset:0;z-index:10;pointer-events:none;}
  .label{position:absolute;transform:translate(-50%,-100%);
    background:rgba(20,21,40,.72);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:999px;
    padding:5px 12px;font-size:12.5px;white-space:nowrap;color:var(--ink);
    pointer-events:auto;cursor:pointer;transition:transform .12s ease,background .12s ease;
    box-shadow:0 6px 20px rgba(0,0,0,.35);}
  .label:hover,.label:focus-visible{background:rgba(40,42,78,.92);transform:translate(-50%,-100%) scale(1.06);outline:none;}
  .label .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:middle;}

  /* 控制提示 */
  .hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:20;
    display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
    background:rgba(20,21,40,.6);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:12px;padding:8px 14px;font-size:12.5px;color:var(--muted);
    pointer-events:none;max-width:92vw;}
  .hint b{color:var(--ink);font-weight:600;}
  .hint .mobile-only{display:none;}
  kbd{background:#23254a;border:1px solid var(--line);border-bottom-width:2px;border-radius:6px;
    padding:1px 6px;font-family:inherit;font-size:11.5px;color:var(--ink);}

  /* 触屏摇杆 */
  #stick{position:fixed;left:18px;bottom:74px;width:104px;height:104px;border-radius:50%;z-index:25;
    border:1px solid var(--line);background:rgba(20,21,40,.35);backdrop-filter:blur(6px);
    display:none;touch-action:none;}
  #stick .knob{position:absolute;left:50%;top:50%;width:44px;height:44px;border-radius:50%;
    background:rgba(244,241,234,.22);border:1px solid rgba(255,255,255,.22);
    transform:translate(-50%,-50%);pointer-events:none;}
  @media (pointer:coarse){ #stick{display:block;} .hint .mobile-only{display:inline;} }

  /* 项目卡 */
  .scrim{position:fixed;inset:0;z-index:40;background:rgba(6,6,14,.55);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;padding:20px;}
  .scrim.open{display:flex;animation:fade .18s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .card{width:min(440px,100%);background:var(--card);border:1px solid var(--line);
    border-radius:18px;box-shadow:var(--shadow);padding:24px;position:relative;
    transform:translateY(8px);animation:rise .22s ease forwards;}
  @keyframes rise{to{transform:translateY(0)}}
  .card .stripe{height:5px;border-radius:999px;width:46px;margin-bottom:16px;}
  .card h2{margin:0;font-size:21px;line-height:1.25;}
  .card .en{margin:2px 0 0;font-size:12.5px;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;}
  .card .desc{margin:14px 0 16px;font-size:14.5px;line-height:1.7;color:#dddaf0;}
  .tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
  .tag{font-size:11.5px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:3px 10px;}
  .actions{display:flex;gap:10px;align-items:center;}
  .btn{appearance:none;border:0;cursor:pointer;font:inherit;font-size:14px;font-weight:600;
    padding:10px 18px;border-radius:10px;background:var(--ink);color:#15131f;text-decoration:none;
    display:inline-flex;align-items:center;gap:6px;transition:transform .1s ease,opacity .1s ease;}
  .btn:hover{transform:translateY(-1px);}
  .btn:focus-visible{outline:3px solid var(--focus);outline-offset:2px;}
  .btn-muted{font-size:13px;color:var(--muted);}
  .close{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:9px;
    background:transparent;border:1px solid var(--line);color:var(--ink);font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;}
  .close:hover{background:rgba(255,255,255,.06);}
  .close:focus-visible{outline:3px solid var(--focus);outline-offset:2px;}

  /* 入场遮罩 */
  .intro{position:fixed;inset:0;z-index:60;background:radial-gradient(120% 120% at 50% 30%,#1a1c38 0%,#0b0c1a 70%);

  .intro.hide{opacity:0;pointer-events:none;}

  .intro .sub{color:var(--muted);font-size:15px;margin:0 0 26px;}
  .intro .keys{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;color:var(--muted);font-size:13px;margin-bottom:28px;max-width:560px;}

  .enter{font-size:16px;padding:13px 30px;border-radius:12px;background:var(--ink);color:#15131f;border:0;cursor:pointer;font-weight:700;}
  .enter:focus-visible{outline:3px solid var(--focus);outline-offset:3px;}
  .credit{position:fixed;bottom:14px;right:16px;z-index:20;font-size:11px;color:var(--muted);opacity:.75;pointer-events:none;text-align:right;}
  .credit a{color:inherit;}
  .fallback{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:30px;text-align:center;color:var(--muted);z-index:70;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
  @media (max-width:640px){ .hint .desktop-only{display:none;} .credit{display:none;} }
</style>

  <div class="fallback" id="fallback">
    你的浏览器似乎不支持 WebGL，换一个现代浏览器（Chrome / Safari / Edge）就能进入。
  </div>

function makeSign(zh, en, color){
  const cv = document.createElement('canvas'); cv.width = 560; cv.height = 200;
  const ctx = cv.getContext('2d');
  ctx.textAlign = 'center';
  ctx.fillStyle = color;
  ctx.fillRect(cv.width/2 - 32, 26, 64, 7);
  ctx.fillStyle = '#f4f1ea';
  ctx.font = '600 62px -apple-system, "PingFang SC", "Segoe UI", sans-serif';
  ctx.fillText(zh, cv.width/2, 116);
  ctx.fillStyle = 'rgba(186,192,226,.92)';
  ctx.font = '500 25px -apple-system, "Segoe UI", sans-serif';
  ctx.fillText(en.split('').join('  '), cv.width/2, 162);
  const tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true, depthWrite:false }));
  sp.scale.set(4.9, 1.75, 1);
  return sp;
}

function makeMat(color, opts={}){ return new THREE.MeshStandardMaterial({ color, roughness:0.5, metalness:0.05, emissive:color, emissiveIntensity:0, ...opts }); }
// 在 a、b 两点间架一根细杆
function barBetween(g, a, b, mat, r=0.03){
  const d = new THREE.Vector3().subVectors(b, a);
  const m = new THREE.Mesh(new THREE.CylinderGeometry(r, r, d.length(), 8), mat);
  m.position.copy(a).addScaledVector(d, 0.5);
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), d.clone().normalize());
  g.add(m);
}

/* ---------- 布点：四个星区双排弧线 + 中央纪念碑 ---------- */
const PROJECTS = [];      // 扁平化数据（含位置与所属星区）
ZONES.forEach(z=>{
  const n = z.items.length;
  const outerN = Math.ceil(n/2), innerN = n - outerN;
  z.items.forEach((p, i)=>{
    const outer = i < outerN;
    const idx = outer ? i : i - outerN;
    const N = outer ? outerN : innerN;
    const R = outer ? 12.2 : 9.0;
    const step = N > 1 ? Math.min(outer ? 0.36 : 0.42, 1.4/(N-1)) : 0;
    const a = z.a0 + (idx - (N-1)/2) * step;
    PROJECTS.push({ ...p, zone:z.name, px:Math.cos(a)*R, pz:Math.sin(a)*R, scale:1 });
  });
});
PROJECTS.push({ ...CENTER, px:0, pz:0, scale:1.35, onDais:true });

const interactives = [];      // 可点击的物件 Group
const obstacles = [{ x:0, z:0, r:3.1 }]; // 中央台座碰撞
const labelEls = [];          // 浮动标签 DOM
const labelLayer = document.getElementById('labels');
const tmpV = new THREE.Vector3();

PROJECTS.forEach((p, i) => {
  const baseY = p.onDais ? 0.5 : 0.6;

  // 基座（中央纪念碑用台座，不再加圆柱）
  if(!p.onDais){
    const ped = new THREE.Mesh(new THREE.CylinderGeometry(1.05,1.2,0.6,28),
      new THREE.MeshStandardMaterial({ color:'#26273f', roughness:0.8 }));
    ped.position.set(p.px, 0.3, p.pz); ped.castShadow=true; ped.receiveShadow=true;
    scene.add(ped);
    obstacles.push({ x:p.px, z:p.pz, r:1.7 });
  }

  // 物件
  const obj = shapes[p.shape](p.color);
  obj.position.set(p.px, baseY, p.pz);
  if(!p.onDais) obj.lookAt(0, baseY, 0);
  obj.scale.setScalar(p.scale);
  obj.traverse(o=>{ if(o.isMesh){ o.castShadow=true; o.userData.pid=i; } });
  obj.userData.pid = i;
  obj.userData.baseY = baseY;
  scene.add(obj);
  interactives.push(obj);

  // 浮动标签
  const el = document.createElement('button');
  el.className = 'label';
  el.innerHTML = `<span class="dot" style="background:${p.color}"></span>${p.name}`;
  el.addEventListener('click', (e)=>{ e.stopPropagation(); if(!entered) return; openCard(i); });
  labelLayer.appendChild(el);
  labelEls.push(el);
});

/* ---------- 控制：WASD / 摇杆移动 + 拖拽环顾 ---------- */
let yaw = 0, pitch = -0.05;
const keys = {};
let dragging = false, lastX=0, lastY=0, moved=0;
let cardOpen = false, entered = false;

addEventListener('keydown', e=>{ keys[e.code]=true; });
addEventListener('keyup', e=>{ keys[e.code]=false; });

canvas.addEventListener('pointerdown', e=>{
  if(!entered || cardOpen) return;
  dragging=true; moved=0; lastX=e.clientX; lastY=e.clientY;
  canvas.classList.add('grabbing');
  try{ canvas.setPointerCapture(e.pointerId); }catch(_){}
});
canvas.addEventListener('pointermove', e=>{
  if(dragging){
    const dx=e.clientX-lastX, dy=e.clientY-lastY; lastX=e.clientX; lastY=e.clientY;
    moved += Math.abs(dx)+Math.abs(dy);
    yaw -= dx*0.0026;
    pitch -= dy*0.0026;
    pitch = Math.max(-1.2, Math.min(1.0, pitch));
  } else {
    updateHover(e.clientX, e.clientY);
  }
});
canvas.addEventListener('pointerup', e=>{
  canvas.classList.remove('grabbing');
  if(dragging && moved < 7){ tryClick(e.clientX, e.clientY); }
  dragging=false;
});
canvas.addEventListener('pointercancel', ()=>{ dragging=false; canvas.classList.remove('grabbing'); });
addEventListener('blur', ()=>{ for(const k in keys) keys[k]=false; joy.x=0; joy.y=0; });

// 触屏摇杆
const joy = { x:0, y:0 };
const stick = document.getElementById('stick'), knob = document.getElementById('knob');
let stickId = null;
function setKnob(dx, dy){ knob.style.transform = `translate(calc(-50% + ${dx*34}px), calc(-50% + ${dy*34}px))`; }
stick.addEventListener('pointerdown', e=>{
  stickId = e.pointerId;
  try{ stick.setPointerCapture(e.pointerId); }catch(_){}
  moveStick(e);
});
stick.addEventListener('pointermove', e=>{ if(e.pointerId===stickId) moveStick(e); });
function moveStick(e){
  const r = stick.getBoundingClientRect();
  let dx = (e.clientX - (r.left + r.width/2)) / (r.width/2);
  let dy = (e.clientY - (r.top + r.height/2)) / (r.height/2);
  const m = Math.hypot(dx, dy);
  if(m > 1){ dx/=m; dy/=m; }
  joy.x = dx; joy.y = dy;
  setKnob(dx, dy);
}
function endStick(e){ if(e.pointerId===stickId){ stickId=null; joy.x=0; joy.y=0; setKnob(0,0); } }
stick.addEventListener('pointerup', endStick);
stick.addEventListener('pointercancel', endStick);

const raycaster = new THREE.Raycaster();
function ndc(x,y){ return new THREE.Vector2((x/window.innerWidth)*2-1, -(y/window.innerHeight)*2+1); }

let hoveredId = -1;
function pick(x,y){
  raycaster.setFromCamera(ndc(x,y), camera);
  const hits = raycaster.intersectObjects(interactives, true);
  if(hits.length){ let o=hits[0].object; while(o && o.userData.pid===undefined) o=o.parent; return o?o.userData.pid:-1; }
  return -1;
}
function updateHover(x,y){
  const id = pick(x,y);
  hoveredId = id;
  canvas.classList.toggle('pointer', id>=0);
}
function tryClick(x,y){ const id = pick(x,y); if(id>=0) openCard(id); }

/* ---------- 项目卡 ---------- */
const scrim=document.getElementById('scrim'), closeBtn=document.getElementById('closeBtn');
let lastFocus=null;
function openCard(i){
  const p=PROJECTS[i];
  document.getElementById('cardStripe').style.background=p.color;
  document.getElementById('cardTitle').textContent=p.name;
  document.getElementById('cardEn').textContent=p.en + ' · ' + p.zone;
  document.getElementById('cardDesc').textContent=p.desc;
  document.getElementById('cardTags').innerHTML=p.tags.map(t=>`<span class="tag">${t}</span>`).join('');
  const act=document.getElementById('cardActions');
  if(p.link && p.link.startsWith('http')){
    const isRepo = p.link.includes('github.com');
    act.innerHTML=`<a class="btn" href="${p.link}" target="_blank" rel="noopener">${isRepo?'打开仓库':'打开项目'} ↗</a>`;
  } else {
    act.innerHTML=`<span class="btn-muted">Demo 待上线 · 部署后在代码里补链接</span>`;
  }
  lastFocus=document.activeElement;
  scrim.classList.add('open'); cardOpen=true;
  for(const k in keys) keys[k]=false; // 停下脚步
  closeBtn.focus();
}
function closeCard(){ scrim.classList.remove('open'); cardOpen=false; if(lastFocus) lastFocus.focus(); }
closeBtn.addEventListener('click', closeCard);
scrim.addEventListener('click', e=>{ if(e.target===scrim) closeCard(); });
addEventListener('keydown', e=>{ if(e.key==='Escape' && cardOpen) closeCard(); });

/* ---------- 入场 ---------- */
const intro=document.getElementById('intro');
document.getElementById('enterBtn').addEventListener('click', ()=>{ intro.classList.add('hide'); setTimeout(()=>{ entered=true; }, 350); });

// 调试/可玩 hook（也方便你在控制台 PU.openCard(2) 试卡片）
window.PU = { camera, openCard, projects:PROJECTS, get pos(){return camera.position.toArray().map(n=>+n.toFixed(2));}, get rot(){return [+yaw.toFixed(2), +pitch.toFixed(2)];} };

/* ---------- 循环 ---------- */
let prev=performance.now();
function animate(now){
  const dt=Math.min((now-prev)/1000, 0.05); prev=now;

  // 移动
  if(!cardOpen && entered){
    const speed=4.6*dt;
    const fwd=new THREE.Vector3(); camera.getWorldDirection(fwd); fwd.y=0; fwd.normalize();
    const right=new THREE.Vector3().crossVectors(fwd, camera.up).normalize();
    let mz=0, mx=0;
    if(keys['KeyW']||keys['ArrowUp']) mz+=1;
    if(keys['KeyS']||keys['ArrowDown']) mz-=1;
    if(keys['KeyD']||keys['ArrowRight']) mx+=1;
    if(keys['KeyA']||keys['ArrowLeft']) mx-=1;
    mz += -joy.y; mx += joy.x;
    const mag=Math.hypot(mx,mz);
    if(mag>1){ mx/=mag; mz/=mag; }
    if(mag>0.01){
      camera.position.addScaledVector(fwd, mz*speed);
      camera.position.addScaledVector(right, mx*speed);
      // 圆形广场边界
      const len=Math.hypot(camera.position.x, camera.position.z);
      if(len>BOUND_R){ const s=BOUND_R/len; camera.position.x*=s; camera.position.z*=s; }
      // 展品基座碰撞：走太近就沿径向推出去，避免相机穿进展品
      for(const ob of obstacles){
        const dx=camera.position.x-ob.x, dz=camera.position.z-ob.z;
        const d=Math.hypot(dx,dz);
        if(d>1e-4 && d<ob.r){ const s=ob.r/d; camera.position.x=ob.x+dx*s; camera.position.z=ob.z+dz*s; }
      }
    }
  }
  camera.position.y=1.6;
  camera.rotation.y=yaw; camera.rotation.x=pitch;

  // 物件：高亮 + 轻微浮动
  const t=now/1000;
  interactives.forEach((o,i)=>{
    o.position.y=o.userData.baseY+Math.sin(t*1.3+i)*0.05;
    o.rotation.y += (i===hoveredId?0.02:0.0015);
    const target=(i===hoveredId)?0.5:0;
    o.traverse(m=>{ if(m.isMesh && m.material.emissiveIntensity!==undefined){
      // 只抬升原本 emissiveIntensity 较低的网格（屏幕/发光体保持自己的亮度）
      if(m.material.userData.glow===undefined) m.material.userData.glow=m.material.emissiveIntensity;
      const base=m.material.userData.glow;
      m.material.emissiveIntensity += ((Math.max(base,target))-m.material.emissiveIntensity)*0.15;
    }});
  });

  // 更新浮动标签位置
  interactives.forEach((o,i)=>{
    const h = PROJECTS[i].onDais ? 2.6 : 1.7;
    tmpV.set(o.position.x, o.userData.baseY+h, o.position.z).project(camera);
    const el=labelEls[i];
    if(tmpV.z<1 && tmpV.z>-1){
      el.style.display='block';
      el.style.left=((tmpV.x*0.5+0.5)*window.innerWidth)+'px';
      el.style.top=((-tmpV.y*0.5+0.5)*window.innerHeight)+'px';
      const d=camera.position.distanceTo(o.position);
      el.style.opacity=Math.max(0.22, Math.min(1, 17/d - 0.3));
    } else { el.style.display='none'; }
  });

  renderer.render(scene,camera);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

addEventListener('resize', ()=>{
  camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
